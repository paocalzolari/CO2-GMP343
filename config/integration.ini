; integration.ini — integrazioni opt-in con altri programmi.
;
; NOTA: se questo file non esiste, o se tutte le sezioni sono disabilitate,
; il logger si comporta ESATTAMENTE come prima (formato file invariato,
; 6 colonne nell'header `_min`).

; ---------------------------------------------------------------------------
; valve-scheduler — annotazione della posizione valvola VICI nel file `_min.raw`.
;
; Quando abilitato, il file `_min.raw` aggiunge 2 colonne dopo il flag:
;   #date time CO2[PPM] CO2_std[PPM] ndata_60s_mean flag valve_pos valve_label
;
; Il logger legge `status_file` una volta al minuto (al momento del dump
; della media). Sentinelle se il file manca/stale/corrotto: pos=-1, label=-.
;
; IMPORTANTE: il flag (enabled) è valutato al CREAZIONE del file giornaliero.
; Se lo cambi durante la giornata, il file corrente mantiene l'header
; precedente fino al cambio di giorno. Per attivare/disattivare subito
; riavvia il service: `sudo systemctl restart co2-logger`.
; ---------------------------------------------------------------------------
[valve_scheduler]
enabled       = false
status_file   = ~/programs/valve-scheduler/service/valve_status.json
; Se il timestamp dentro valve_status.json è più vecchio di stale_after_s
; secondi, la posizione viene considerata sconosciuta (pos=-1, label=-).
; Mettere 0 per disabilitare il check (sconsigliato).
stale_after_s = 10

; ---------------------------------------------------------------------------
; Calibrazione automatica basata sulla posizione della valvola.
;
; Se calib_auto=true, il flag measure/calib viene determinato dalla
; valve_label corrente:
;   - se valve_label corrisponde a una delle etichette in calib_labels
;     (separati da virgola, case-insensitive) → flag "calib"
;   - altrimenti → flag "measure"
;   - se valve-scheduler non risponde o label sconosciuta → flag "measure"
;
; Questo elimina la necessità del logger di calibrazione separato
; (gmp343_sht31_calib.py): il backend headless gestisce tutto in automatico
; seguendo lo schedule della valvola.
;
; NOTA: calib_auto richiede enabled=true (sopra). Se enabled=false,
; calib_auto viene ignorato e il flag è sempre "measure".
; ---------------------------------------------------------------------------
calib_auto    = false
calib_labels  = zero,span,span-low,span-high
