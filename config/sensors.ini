; sensors.ini — configurazione sensori ausiliari I2C e compensazione GMP343.
; Letto da gmp343_sht31_logger.py (load_sensors_config).
;
; Indirizzi: 0x44/0x45 = SHT3X (T/RH), 0x76/0x77 = BMP388 (pressione).
; Verificare gli indirizzi sul bus con:  i2cdetect -y 1

[sht31_a]
; Sensore T/RH principale (Sensirion SHT3X). ADDR pin a GND → 0x44.
enabled = true
bus = 1
addr = 0x44

[sht31_b]
; Secondo SHT3X opzionale (ADDR pin a VDD → 0x45). Non usato.
enabled = false
bus = 1
addr = 0x45

[bmp388]
; Sensore di pressione barometrica (Bosch BMP388). SDO alto → 0x77, basso → 0x76.
; STANDBY: portare enabled=true SOLO dopo aver verificato il sensore sul bus.
enabled = false
bus = 1
addr = 0x77

[compensation]
; ───────────────────────────────────────────────────────────────────────────
; Invio LIVE di pressione (BMP388) e umidità (SHT3X) alla sonda GMP343 per la
; compensazione interna, tramite POLL-mode (comandi XP/XRH).
;
; STANDBY (enabled=false): il logger gira in RUN-mode come sempre, NON invia
; nulla alla sonda, registra comunque i 3 valori CO2 (CO2/CO2RAW/CO2RAWUC).
;
; ATTIVAZIONE (enabled=true) — da fare DOPO aver cablato e verificato i sensori:
;   1. i2cdetect -y 1  → confermare 0x44 (SHT3X) e 0x76/0x77 (BMP388)
;   2. [bmp388] enabled = true  e  addr corretto
;   3. qui: enabled = true
;   4. sudo systemctl restart co2-logger.service
; Con enabled=true il logger mette la sonda in POLL-mode e ad ogni ciclo invia
; XP <addr> <P_hPa> e XRH <addr> <RH%>, poi legge con SEND <addr>.
;
; NOTA: la TEMPERATURA non si invia — la GMP343 usa il suo sensore interno di
; camera (solo P e RH sono alimentabili dall'esterno).
; ───────────────────────────────────────────────────────────────────────────
enabled = false
; Indirizzo poll della sonda (verificato sul campo = 0)
gmp343_addr = 0
feed_pressure = true
feed_humidity = true
; Intervallo tra le richieste SEND in poll-mode (secondi)
poll_interval_s = 2.0
; Pressione di default (hPa) ripristinata in teardown
default_p_hpa = 1013.0
