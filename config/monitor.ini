[window]
width = 700
height = 500
x = 950
y = 50

[thresholds]
min_valid = 0
max_valid = 10000
low_warning = 300
high_warning = 2000
sentinel_value = 999.99

[colors]
normal_color = #0066cc
low_color = #ff9900
high_color = #cc0000
invalid_color = #999999

[fonts]
title_size = 14
subtitle_size = 12
co2_value_size = 24
label_size = 14
small_size = 12
caption_size = 14
file_path_size = 13

[display]
show_out_of_range = true
show_sentinel = true
co2_decimals = 2
timestamp_format = %Y/%m/%d %H:%M:%S

[graph]
style = lines+points
point_size = 5
line_width = 1.00
trh_style = lines+points
trh_point_size = 2
trh_line_width = 1.00

