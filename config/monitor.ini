[window]
width = 875
height = 789
x = 820
y = 118

[thresholds]
min_valid = 0
max_valid = 10000
low_warning = 300
high_warning = 2000
sentinel_value = 999.99

[colors]
normal_color = #0066cc
low_color = #ff9900
high_color = #cc0000
invalid_color = #999999

[fonts]
title_size = 14
subtitle_size = 12
co2_value_size = 24
label_size = 14
small_size = 12
caption_size = 14
file_path_size = 13

[display]
show_out_of_range = true
show_sentinel = true
co2_decimals = 2
timestamp_format = %Y/%m/%d %H:%M:%S

[graph]
style = lines+points
point_size = 5
line_width = 1.00
trh_style = lines+points
trh_point_size = 2
trh_line_width = 1.00
windows = 10m
color_co2_1m = #2060c0
color_t_1m = #c05000
color_rh_1m = #007060
linestyle_1m = -
line_width_1m = 1.00
alpha_1m = 0.55
color_co2_10m = #ff0000
color_t_10m = #aa5500
color_rh_10m = #00554a
linestyle_10m = -
line_width_10m = 1.00
alpha_10m = 0.55
color_co2_30m = #0c2d66
color_t_30m = #6b2900
color_rh_30m = #003a32
linestyle_30m = -
line_width_30m = 1.00
alpha_30m = 0.55
color_co2_60m = #000033
color_t_60m = #401900
