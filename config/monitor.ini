[window]
# Dimensioni finestra GUI Monitor
# 
# GUI COMPATTA (monitor solo): 700x500
# GUI INTEGRATA (monitor + grafico con tab): 1200x800
#
# Layout consigliati GUI Integrata:
# - Schermo 1920x1080: 1200x800 @ (360,140) - centrato
# - Schermo 1680x1050: 1200x800 @ (240,125) - centrato  
# - Schermo 1280x1024: 1200x800 @ (40,112) - quasi centrato

# GUI Integrata (default)
# width = 1200
# height = 800
# x = 100
# y = 80

# GUI Compatta (decommenta per versione piccola)
width = 700
height = 500
x = 950
y = 50

[thresholds]
# Soglie CO2 (ppm)
min_valid = 0
max_valid = 10000
low_warning = 300
high_warning = 2000
sentinel_value = 999.99

[colors]
# Colori valori CO2 (formato esadecimale)
normal_color = #0066cc
low_color = #ff9900
high_color = #cc0000
invalid_color = #999999

[fonts]
# Dimensioni font (ridotte per layout compatto)
title_size = 14
subtitle_size = 12
co2_value_size = 24
#label_size = 10
label_size = 14
#small_size = 9
small_size = 12

[display]
# Opzioni visualizzazione
show_out_of_range = true
#show_sentinel = false
show_sentinel = true
co2_decimals = 2
timestamp_format = %Y/%m/%d %H:%M:%S
